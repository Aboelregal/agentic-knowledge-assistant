services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  - type: web
    name: rag-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-8b-8192
      - key: CHROMA_DB_PATH
        value: /tmp/chroma_db
      - key: RETRIEVAL_TOP_K
        value: "4"
      - key: QA_MAX_TOKENS
        value: "1024"
      - key: QA_TEMPERATURE
        value: "0.2"

  # ── Streamlit Frontend ───────────────────────────────────────────────────
  - type: web
    name: rag-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    region: frankfurt
    plan: free
    envVars:
      - key: API_BASE_URL
        sync: false
